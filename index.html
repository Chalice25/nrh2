<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Floor Plan - Navaraj Chakri (Detail)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #2c3e50; font-family: sans-serif; }
        #info {
            position: absolute; top: 10px; width: 100%; text-align: center;
            color: white; background: rgba(0,0,0,0.5); padding: 5px; pointer-events: none;
        }
        .controls-hint {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.7); font-size: 14px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="info">แผนผัง 3D อาคารนวราชจักรี ชั้น 3 (แบบละเอียด)</div>
    <div class="controls-hint">หมุน: คลิกซ้าย | เลื่อนมุมมอง: คลิกขวา | ซูม: สกロール</div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls;

        function init() {
            // 1. สร้าง Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x34495e);

            // 2. สร้าง Camera (มุมมองกล้อง)
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(10, 15, 20); // ตั้งค่าตำแหน่งกล้อง

            // 3. สร้าง Renderer (ตัวแสดงผล)
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 4. เพิ่ม OrbitControls (เพื่อให้หมุน ซูมได้)
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; // เพิ่มความนุ่มนวล
            controls.dampingFactor = 0.05;

            // 5. เพิ่มแสงสว่าง
            scene.add(new THREE.AmbientLight(0x404040, 2)); // แสงรอบทิศทาง
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1); // แสงทิศทางเดียว
            directionalLight.position.set(10, 10, 10);
            scene.add(directionalLight);

            // --- 6. โหลดรูปภาพผัง (Texture Mapping) ---
            const loader = new THREE.TextureLoader();
            // *** สำคัญ: เปลี่ยนตรงนี้เป็นชื่อไฟล์รูปภาพที่คุณอัปโหลด ***
            loader.load('navaraj_plan.png', (texture) => {
                
                // --- ส่วนที่ 1: พื้น (Floor) ---
                const floorGeometry = new THREE.PlaneGeometry(30, 20); // ปรับขนาดพื้นตามต้องการ
                const floorMaterial = new THREE.MeshPhongMaterial({ map: texture, side: THREE.DoubleSide });
                const floor = new THREE.Mesh(floorGeometry, floorMatMaterial);
                floor.rotation.x = -Math.PI / 2; // คว่ำพื้นลง
                floor.position.y = -0.1; // ต่ำกว่ากล่องเล็กน้อย
                scene.add(floor);

                // --- ส่วนที่ 2: กล่องแทนอาคาร (Building Box) ---
                // กล่องใหญ่ครอบพื้นที่ห้องแล็บหลัก
                const mainLabGeometry = new THREE.BoxGeometry(10, 3, 15); // x, height, z
                const mainLabMaterial = new THREE.MeshPhongMaterial({ color: 0xe0e0e0, transparent: true, opacity: 0.8 });
                const mainLab = new THREE.Mesh(mainLabGeometry, mainLabMaterial);
                mainLab.position.set(5, 1.5, 0); // ตั้งพิกัด
                scene.add(mainLab);

                // กล่องใหญ่ครอบพื้นที่ออฟฟิศ
                const officeGeometry = new THREE.BoxGeometry(10, 3, 10); // x, height, z
                const officeMaterial = new THREE.MeshPhongMaterial({ color: 0xd0d0d0, transparent: true, opacity: 0.8 });
                const office = new THREE.Mesh(officeGeometry, officeMaterial);
                office.position.set(-5, 1.5, 2); // ตั้งพิกัด
                scene.add(office);

                // --- ส่วนที่ 3: แปะผังบนหลังคากล่อง (Roof Plan) ---
                const roofGeometry = new THREE.PlaneGeometry(30, 20); // ขนาดเดียวกับพื้น
                const roofMaterial = new THREE.MeshPhongMaterial({ map: texture, side: THREE.DoubleSide });
                const roof = new THREE.Mesh(roofGeometry, roofMaterial);
                roof.rotation.x = -Math.PI / 2;
                roof.position.y = 3.01; // วางทับหลังคากล่อง Main Lab และ Office
                scene.add(roof);

            });

            // 7. ฟังก์ชันสำหรับการ Resize หน้าจอ
            window.addEventListener('resize', onWindowResize, false);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 8. ฟังก์ชันการ Render (แสดงผลอย่างต่อเนื่อง)
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // อัปเดตการควบคุม
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>;

animate();
</script>

</body>
</html>
